version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: qc_redis
    ports:
      - '6379:6379'
    restart: unless-stopped
    volumes:
      - redis_data:/data

  api-gateway:
    build:
      context: ./apps/api-gateway
      dockerfile: Dockerfile
    container_name: qc_api_gateway
    ports:
      - '3001:3001'
    environment:
      - REDIS_URL=redis://redis:6379
      - SCRAPER_URL=http://scraper:8001
      - PORT=3001
    env_file:
      - .env
    depends_on:
      - redis
      - scraper
    restart: unless-stopped

  scraper:
    build:
      context: ./apps/scraper
      dockerfile: Dockerfile
    container_name: qc_scraper
    ports:
      - '8001:8001'
    env_file:
      - .env
    restart: unless-stopped

  frontend:
    build:
      context: ./apps/frontend
      dockerfile: Dockerfile
    container_name: qc_frontend
    ports:
      - '3000:3000'
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
    depends_on:
      - api-gateway
    restart: unless-stopped

volumes:
  redis_data:
